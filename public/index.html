<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipShare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22d3ee">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
<div class="max-w-4xl mx-auto px-6 py-8">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-teal-400 rounded-3xl flex items-center justify-center text-3xl">📋</div>
            <h1 class="text-4xl font-bold tracking-tighter">ClipShare <span class="text-cyan-400">Pro</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <!-- PWA Butonu - Sadece PWA değilse görünür -->
            <button onclick="installPWA()" id="installBtn"
                    class="hidden px-6 py-3 bg-white text-zinc-900 rounded-2xl font-semibold hover:bg-cyan-400 hover:text-zinc-950 flex items-center gap-2">
                📲 <span class="hidden sm:inline">Uygulamayı Yükle</span>
            </button>
            
            <button onclick="toggleTheme()" id="themeBtn" 
                    class="w-10 h-10 bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-xl transition-all">
                ☀️
            </button>
        </div>
    </div>

    <!-- LANDING -->
    <div id="landing">
        <div class="text-center mb-16">
            <h2 class="text-6xl font-bold tracking-tighter">Anında Paylaşım</h2>
            <p class="text-zinc-400 mt-3 text-xl">Gerçek zamanlı • Metin • Görüntü</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div onclick="showCreateModal()" class="glass border border-zinc-700 hover:border-cyan-400 rounded-3xl p-10 cursor-pointer">
                <div class="text-cyan-400 text-sm mb-2">✦ YENİ</div>
                <h3 class="text-3xl font-semibold">Yeni Oda Oluştur</h3>
                <p class="text-zinc-400 mt-2">İsim + Şifre ile</p>
            </div>

            <div class="glass border border-zinc-700 rounded-3xl p-10">
                <h3 class="text-2xl font-semibold mb-6">Odaya Katıl</h3>
                <input id="joinRoomId" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-4 outline-none" placeholder="Oda kodu">
                <input id="joinPass" type="password" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-6 outline-none" placeholder="Şifre (opsiyonel)">
                <button onclick="joinRoom()" class="w-full bg-white text-zinc-900 py-6 rounded-3xl font-semibold text-xl">Katıl</button>
            </div>
        </div>
    </div>

    <!-- ROOM SCREEN -->
    <div id="roomScreen" class="hidden">
        <div class="flex justify-between items-center mb-8 bg-zinc-900 border border-zinc-700 rounded-3xl px-8 py-5">
            <div>
                <span id="roomName" class="text-3xl font-semibold"></span>
                <span id="roomId" class="font-mono ml-4 text-cyan-400 bg-zinc-800 px-4 py-2 rounded-2xl text-sm"></span>
            </div>
            <div class="flex gap-3">
                <button onclick="showSettingsModal()" class="px-5 py-3 bg-zinc-800 rounded-2xl">⚙️</button>
                <button onclick="copyRoomLink()" class="px-5 py-3 bg-zinc-800 rounded-2xl">🔗</button>
                <button onclick="leaveRoom()" class="px-5 py-3 text-red-400">Çıkış</button>
            </div>
        </div>

        <div id="currentContent" class="glass border border-zinc-700 rounded-3xl p-10 min-h-[280px] flex flex-col items-center justify-center"></div>

        <div class="mt-8 grid grid-cols-1 lg:grid-cols-5 gap-6">
            <div class="lg:col-span-3">
                <textarea id="textInput" rows="5" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl p-6 outline-none" placeholder="Metin yaz veya yapıştır..."></textarea>
            </div>
            <div class="lg:col-span-2 space-y-4">
                <button onclick="sendText()" class="w-full h-28 bg-gradient-to-r from-cyan-400 to-teal-400 text-zinc-950 font-bold rounded-3xl text-2xl">🚀 PAYLAŞ</button>
                <button onclick="pasteAndSend()" class="w-full h-28 border border-zinc-700 rounded-3xl">📋 Panodan Paylaş</button>
                <button onclick="document.getElementById('fileInput').click()" class="w-full h-28 border border-dashed border-zinc-600 rounded-3xl">📸 Görüntü Yükle</button>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="sendImage(event)">
            </div>
        </div>

        <!-- TARİHÇE -->
        <div class="mt-12">
            <h3 class="text-xl font-medium mb-6">Paylaşım Tarihiçesi</h3>
            <div id="historyList" class="space-y-4 max-h-[420px] overflow-y-auto"></div>
        </div>
    </div>
</div>

<!-- Modallar -->
<div id="createModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass border border-zinc-700 rounded-3xl p-8 w-full max-w-md">
        <h3 class="text-2xl font-semibold mb-6">Yeni Oda Oluştur</h3>
        <input id="createName" value="Benim Panom" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-4 outline-none">
        <input id="createPass" type="password" placeholder="Şifre (isteğe bağlı)" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-8 outline-none">
        <div class="flex gap-4">
            <button onclick="hideCreateModal()" class="flex-1 py-5 border border-zinc-700 rounded-3xl">İptal</button>
            <button onclick="createRoom()" class="flex-1 py-5 bg-cyan-400 text-zinc-950 font-semibold rounded-3xl">Oluştur</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass border border-zinc-700 rounded-3xl p-8 w-full max-w-md">
        <h3 class="text-2xl font-semibold mb-6">Oda Ayarları</h3>
        <input id="settingsName" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-4 outline-none">
        <input id="settingsPass" type="password" placeholder="Yeni Şifre" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 mb-8 outline-none">
        <div class="flex gap-4">
            <button onclick="hideSettingsModal()" class="flex-1 py-5 border border-zinc-700 rounded-3xl">İptal</button>
            <button onclick="saveSettings()" class="flex-1 py-5 bg-cyan-400 text-zinc-950 font-semibold rounded-3xl">Kaydet</button>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentRoomId = null;
    let deferredPrompt = null;
    let isDark = true;
    let history = [];

    // ==================== PWA KONTROLÜ ====================
    function isRunningAsPWA() {
        return window.matchMedia('(display-mode: standalone)').matches || 
               window.navigator.standalone === true;
    }

    // PWA Butonunu sadece PWA değilse göster
    window.addEventListener('beforeinstallprompt', e => {
        deferredPrompt = e;
        if (!isRunningAsPWA()) {
            document.getElementById('installBtn').classList.remove('hidden');
        }
    });

    async function installPWA() {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            await deferredPrompt.userChoice;
            deferredPrompt = null;
            document.getElementById('installBtn').classList.add('hidden');
        }
    }

    // ==================== TEMA ====================
    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeBtn').innerHTML = '☀️';
        } else {
            document.documentElement.classList.remove('dark');
            document.getElementById('themeBtn').innerHTML = '🌙';
        }
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // ==================== Diğer Fonksiyonlar ====================
    function showCreateModal() { document.getElementById('createModal').classList.remove('hidden'); }
    function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }
    function showSettingsModal() { document.getElementById('settingsModal').classList.remove('hidden'); }
    function hideSettingsModal() { document.getElementById('settingsModal').classList.add('hidden'); }

    function createRoom() {
        const name = document.getElementById('createName').value || "Yeni Oda";
        hideCreateModal();
        socket = io();
        socket.emit('createRoom', { roomName: name, password: null });
        socket.on('roomCreated', ({ roomId }) => {
            currentRoomId = roomId;
            enterRoom(roomId, name);
        });
    }

    function joinRoom() {
        const roomId = document.getElementById('joinRoomId').value.trim();
        if (!roomId) return alert("Oda kodu girin!");
        socket = io();
        socket.emit('joinRoom', { roomId, password: null });
        socket.on('roomJoined', (data) => {
            currentRoomId = data.roomId;
            enterRoom(data.roomId, data.roomName || "Oda");
        });
    }

    function enterRoom(roomId, name) {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('roomScreen').classList.remove('hidden');
        document.getElementById('roomName').textContent = name;
        document.getElementById('roomId').textContent = roomId;

        socket.on('newContent', (data) => {
            renderCurrent(data);
            history.unshift(data);
            if (history.length > 30) history.pop();
            renderHistory();
        });
    }

    function renderCurrent(data) {
        const el = document.getElementById('currentContent');
        if (data.type === 'text') {
            el.innerHTML = `<p class="text-2xl leading-relaxed">${data.value}</p>`;
        } else {
            el.innerHTML = `
                <img src="${data.value}" class="max-h-96 rounded-3xl mx-auto">
                <a href="${data.value}" download="clipshare.jpg" 
                   class="mt-6 inline-flex items-center gap-2 px-6 py-3 bg-white text-zinc-900 rounded-2xl font-medium">
                    ⬇️ Görüntüyü İndir
                </a>
            `;
        }
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(item => `
            <div class="glass border border-zinc-700 rounded-3xl p-5 flex gap-4">
                ${item.type === 'text' ? 
                    `<p class="flex-1">${item.value}</p>` : 
                    `<img src="${item.value}" class="w-20 h-20 object-cover rounded-2xl">`}
                ${item.type === 'image' ? 
                    `<a href="${item.value}" download class="self-center ml-auto text-cyan-400">⬇️ İndir</a>` : ''}
            </div>
        `).join('');
    }

    function sendText() {
        const text = document.getElementById('textInput').value.trim();
        if (text) socket.emit('share', { roomId: currentRoomId, type: 'text', value: text });
        document.getElementById('textInput').value = '';
    }

    async function pasteAndSend() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) socket.emit('share', { roomId: currentRoomId, type: 'text', value: text });
        } catch(e) {}
    }

    function sendImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => socket.emit('share', { roomId: currentRoomId, type: 'image', value: reader.result });
        reader.readAsDataURL(file);
    }

    function copyRoomLink() {
        navigator.clipboard.writeText(`\( {window.location.origin}?room= \){currentRoomId}`);
        alert("✅ Link kopyalandı!");
    }

    function saveSettings() {
        const newName = document.getElementById('settingsName').value;
        if (newName) document.getElementById('roomName').textContent = newName;
        hideSettingsModal();
    }

    function leaveRoom() {
        if (confirm("Çıkmak istediğinize emin misiniz?")) location.reload();
    }

    // ==================== BAŞLANGIÇ ====================
    window.onload = () => {
        // Tema yükle
        if (localStorage.getItem('theme') === 'light') {
            isDark = false;
            document.documentElement.classList.remove('dark');
            document.getElementById('themeBtn').innerHTML = '🌙';
        }

        // Eğer PWA olarak çalışıyorsa yükle butonunu gizle
        if (isRunningAsPWA()) {
            document.getElementById('installBtn').classList.add('hidden');
        }

        console.log('%c✅ ClipShare Pro - Tüm düzeltmeler uygulandı', 'color:#22d3ee; font-weight:bold');
    };
</script>
</body>
</html>
