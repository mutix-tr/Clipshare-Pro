<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipShare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#22d3ee">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.ibb.co/yFCRDybp/mh71jsdb.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/yFCRDybp/mh71jsdb.png">
    <link rel="apple-touch-icon" sizes="192x192" href="https://i.ibb.co/yFCRDybp/mh71jsdb.png">
    <link rel="apple-touch-icon" sizes="512x512" href="https://i.ibb.co/yFCRDybp/mh71jsdb.png">

    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .dark body { background-color: #09090b; color: #f4f4f5; }
        body:not(.dark) { background-color: #f8fafc; color: #0f172a; }
        body:not(.dark) .glass { background: rgba(0,0,0,0.02); border-color: rgba(0,0,0,0.1); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background-color: #ef4444; }
    </style>
</head>
<body class="min-h-screen">
<div class="max-w-4xl mx-auto px-6 py-8">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-teal-400 rounded-2xl flex items-center justify-center text-2xl shadow-lg">📋</div>
            <div>
                <h1 class="text-3xl font-bold tracking-tighter">ClipShare <span class="text-cyan-400">Pro</span></h1>
                <div class="flex items-center gap-2">
                    <span id="connStatus" class="status-dot offline"></span>
                    <span id="statusText" class="text-[10px] font-bold uppercase opacity-50">Bağlanıyor...</span>
                </div>
            </div>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="w-11 h-11 bg-zinc-200 dark:bg-zinc-900 rounded-xl text-xl flex items-center justify-center hover:scale-105 transition-all shadow-sm">☀️</button>
    </div>

    <!-- LANDING -->
    <div id="landing">
        <div class="text-center mb-16">
            <h2 class="text-6xl font-black tracking-tighter mb-4">Anında Paylaş.</h2>
            <p class="text-zinc-500 dark:text-zinc-400 text-xl">Cihazlar arası gerçek zamanlı veri transferi.</p>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div onclick="showCreateModal()" class="glass rounded-3xl p-10 cursor-pointer hover:border-cyan-500 transition-all group shadow-xl">
                <div class="text-cyan-500 text-xs font-bold mb-2 tracking-widest">✦ YENİ ALAN</div>
                <h3 class="text-3xl font-bold group-hover:text-cyan-400 transition-colors">Oda Oluştur</h3>
                <p class="text-zinc-500 mt-2">Hızlıca yeni bir kod al.</p>
            </div>

            <div class="glass rounded-3xl p-10 shadow-xl">
                <h3 class="text-2xl font-bold mb-6">Odaya Katıl</h3>
                <input id="joinRoomId" class="w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-6 py-4 mb-4 outline-none focus:border-cyan-500 font-mono" placeholder="Oda Kodu">
                <button onclick="joinRoom()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white py-4 rounded-2xl font-bold transition-all shadow-lg shadow-cyan-500/20">Katıl</button>
            </div>
        </div>
    </div>

    <!-- ROOM SCREEN -->
    <div id="roomScreen" class="hidden">
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-2xl px-6 py-4">
            <div class="flex items-center gap-4">
                <span id="roomNameDisplay" class="text-xl font-bold"></span>
                <span id="roomIdDisplay" class="font-mono text-cyan-500 bg-cyan-500/10 px-3 py-1 rounded-lg text-sm border border-cyan-500/20"></span>
            </div>
            <div class="flex gap-2">
                <button onclick="showSettingsModal()" class="w-10 h-10 flex items-center justify-center bg-zinc-200 dark:bg-zinc-800 rounded-lg hover:bg-cyan-500/10 transition-colors">⚙️</button>
                <button onclick="copyRoomLink()" class="w-10 h-10 flex items-center justify-center bg-zinc-200 dark:bg-zinc-800 rounded-lg hover:bg-cyan-500/10 transition-colors">🔗</button>
                <button onclick="leaveRoom()" class="px-4 text-red-500 font-bold hover:bg-red-500/10 rounded-lg transition-colors">Çıkış</button>
            </div>
        </div>

        <div id="currentContent" class="glass rounded-[2rem] p-8 min-h-[320px] flex flex-col items-center justify-center text-center shadow-2xl border-dashed border-2 border-zinc-700/30 mb-8"></div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
            <textarea id="textInput" class="lg:col-span-3 w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-3xl p-6 outline-none focus:border-cyan-500 min-h-[160px] resize-none shadow-sm" placeholder="Buraya yazın veya panoyu yapıştırın..."></textarea>
            <div class="lg:col-span-2 flex flex-col gap-4">
                <button onclick="sendText()" class="w-full flex-1 bg-gradient-to-r from-cyan-500 to-teal-500 text-white font-black rounded-3xl text-xl shadow-xl hover:brightness-110 active:scale-95 transition-all">PAYLAŞ</button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="pasteAndSend()" class="py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all font-bold text-sm">📋 Yapıştır</button>
                    <button onclick="document.getElementById('fileInput').click()" class="py-4 border border-zinc-300 dark:border-zinc-700 rounded-2xl hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-all font-bold text-sm">📸 Resim</button>
                </div>
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="sendImage(event)">
            </div>
        </div>

        <div class="mt-12">
            <h3 class="text-lg font-bold mb-6 flex items-center gap-2">🕒 Geçmiş</h3>
            <div id="historyList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2"></div>
        </div>
    </div>
</div>

<!-- MODALS -->
<div id="createModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl p-8 w-full max-w-sm shadow-2xl">
        <h3 class="text-2xl font-bold mb-6">Yeni Alan Oluştur</h3>
        <input id="createNameInput" value="Paylaşım Odası" class="w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded-2xl px-6 py-4 mb-6 outline-none focus:border-cyan-500">
        <div class="flex gap-3">
            <button onclick="hideCreateModal()" class="flex-1 py-4 font-bold opacity-50">İptal</button>
            <button onclick="createRoom()" class="flex-[2] py-4 bg-cyan-500 text-white font-bold rounded-2xl hover:bg-cyan-400">Oluştur</button>
        </div>
    </div>
</div>

<div id="settingsModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="glass rounded-3xl p-8 w-full max-w-sm shadow-2xl">
        <h3 class="text-2xl font-bold mb-6">Oda Ayarları</h3>
        <input id="settingsNameInput" class="w-full bg-zinc-100 dark:bg-zinc-900 border border-zinc-300 dark:border-zinc-800 rounded-2xl px-6 py-4 mb-6 outline-none focus:border-cyan-500">
        <div class="flex gap-3">
            <button onclick="hideSettingsModal()" class="flex-1 py-4 font-bold opacity-50">Kapat</button>
            <button onclick="saveSettings()" class="flex-[2] py-4 bg-cyan-500 text-white font-bold rounded-2xl hover:bg-cyan-400">Kaydet</button>
        </div>
    </div>
</div>

<script>
    let socket = null;
    let currentRoomId = null;
    let historyData = [];

    // ====================== TEMA ======================
    function applyTheme(theme) {
        const isDark = theme === 'dark';
        document.documentElement.classList.toggle('dark', isDark);
        document.getElementById('themeBtn').innerHTML = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
    }

    function toggleTheme() {
        applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    }

    // ====================== PWA ======================
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.log('SW Error:', err));
    }

    // ====================== SOCKET ======================
    function initSocket() {
        if (socket) return;
        socket = io();

        socket.on('connect', () => {
            document.getElementById('connStatus').className = 'status-dot online';
            document.getElementById('statusText').textContent = 'Çevrimiçi';
        });

        socket.on('disconnect', () => {
            document.getElementById('connStatus').className = 'status-dot offline';
            document.getElementById('statusText').textContent = 'Bağlantı Kesildi';
        });

        socket.on('roomCreated', ({ roomId }) => {
            enterRoomUI(roomId, document.getElementById('createNameInput').value || "Yeni Oda");
        });

        socket.on('roomJoined', (data) => {
            enterRoomUI(data.roomId, data.roomName || "Oda");
            if (data.current) renderCurrent(data.current);
            if (data.history) historyData = data.history;
            renderHistory();
        });

        socket.on('newContent', (data) => {
            renderCurrent(data);
            historyData.unshift(data);
            if (historyData.length > 25) historyData.pop();
            renderHistory();
        });

        socket.on('roomSettingsUpdated', ({ name }) => {
            document.getElementById('roomNameDisplay').textContent = name;
        });

        socket.on('error', (msg) => alert(msg));
    }

    function enterRoomUI(roomId, roomName) {
        currentRoomId = roomId;
        localStorage.setItem('lastRoomId', roomId);
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('roomScreen').classList.remove('hidden');
        document.getElementById('roomNameDisplay').textContent = roomName;
        document.getElementById('roomIdDisplay').textContent = roomId;
    }

    // ====================== ODA İŞLEMLERİ ======================
    function showCreateModal() { document.getElementById('createModal').classList.remove('hidden'); }
    function hideCreateModal() { document.getElementById('createModal').classList.add('hidden'); }
    function showSettingsModal() { 
        document.getElementById('settingsNameInput').value = document.getElementById('roomNameDisplay').textContent;
        document.getElementById('settingsModal').classList.remove('hidden'); 
    }
    function hideSettingsModal() { document.getElementById('settingsModal').classList.add('hidden'); }

    function createRoom() {
        const name = document.getElementById('createNameInput').value.trim() || "Yeni Oda";
        hideCreateModal();
        initSocket();
        socket.emit('createRoom', { roomName: name });
    }

    function joinRoom() {
        const id = document.getElementById('joinRoomId').value.trim();
        if (!id) return alert("Oda kodu girin!");
        initSocket();
        socket.emit('joinRoom', { roomId: id });
    }

    function saveSettings() {
        const newName = document.getElementById('settingsNameInput').value.trim();
        if (newName && socket) {
            socket.emit('updateRoomSettings', { roomId: currentRoomId, newName });
        }
        hideSettingsModal();
    }

    // ====================== PAYLAŞIM ======================
    function sendText() {
        const text = document.getElementById('textInput').value.trim();
        if (text && socket) {
            socket.emit('share', { roomId: currentRoomId, type: 'text', value: text });
            document.getElementById('textInput').value = '';
        }
    }

    function sendImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
            socket.emit('share', { roomId: currentRoomId, type: 'image', value: reader.result });
        };
        reader.readAsDataURL(file);
    }

    async function pasteAndSend() {
        try {
            const text = await navigator.clipboard.readText();
            if (text) {
                document.getElementById('textInput').value = text;
                sendText();
            }
        } catch(e) { alert("Panoya erişim izni gerekiyor."); }
    }

    // ====================== GÖRÜNTÜLEME ======================
    function renderCurrent(data) {
        const container = document.getElementById('currentContent');
        container.innerHTML = '';
        if (data.type === 'text') {
            container.innerHTML = `
                <p class="text-3xl font-bold break-words px-4 mb-8">${data.value}</p>
                <button onclick="copyToClipboard('${data.value.replace(/'/g, "\\'")}')" 
                        class="bg-cyan-500 text-white px-8 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">KOPYALA</button>
            `;
        } else {
            container.innerHTML = `
                <img src="${data.value}" class="max-h-[380px] rounded-2xl shadow-2xl mb-6">
                <a href="${data.value}" download="clipshare-image.png" 
                   class="text-cyan-500 font-bold hover:underline">⬇️ Görseli İndir</a>
            `;
        }
    }

    function renderHistory() {
        const container = document.getElementById('historyList');
        container.innerHTML = historyData.map(item => `
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="truncate flex-1">
                    <p class="text-xs opacity-60">${item.type === 'text' ? 'Metin' : 'Görüntü'}</p>
                    <p class="truncate">${item.type === 'text' ? item.value.substring(0, 60) + '...' : '📷 Görsel'}</p>
                </div>
                <button onclick='renderCurrent(${JSON.stringify(item)})' class="text-cyan-500 px-3 py-1 hover:bg-cyan-500/10 rounded-lg">Göster</button>
            </div>
        `).join('');
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => alert("✅ Kopyalandı!"));
    }

    function copyRoomLink() {
        navigator.clipboard.writeText(`\( {window.location.origin}?room= \){currentRoomId}`);
        alert("✅ Oda linki kopyalandı!");
    }

    function leaveRoom() {
        if (confirm("Odadan çıkmak istediğinize emin misiniz?")) {
            localStorage.removeItem('lastRoomId');
            location.reload();
        }
    }

    // ====================== BAŞLANGIÇ ======================
    window.onload = () => {
        applyTheme(localStorage.getItem('theme') || 'dark');
    };
</script>
</body>
</html>
