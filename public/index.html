<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipShare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#22d3ee">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .glass { 
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
        }
        
        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 50px -12px rgb(34 211 238 / 0.2);
        }
        
        .install-btn {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen pb-12 transition-colors">
    <div class="max-w-4xl mx-auto px-6 pt-8">

        <!-- HEADER -->
        <div class="flex items-center justify-between mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-teal-400 rounded-3xl flex items-center justify-center text-3xl shadow-lg">📋</div>
                <div>
                    <h1 class="text-4xl font-bold tracking-tighter">ClipShare</h1>
                    <p class="text-cyan-400 text-sm -mt-1 font-medium">Pro</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="installPWA()" id="installBtn"
                        class="hidden px-6 py-3 bg-white text-zinc-900 hover:bg-cyan-400 hover:text-white font-semibold rounded-2xl text-sm install-btn">
                    📲 Uygulamayı Yükle
                </button>
                
                <button onclick="toggleTheme()" id="themeBtn"
                        class="w-11 h-11 flex items-center justify-center bg-zinc-900 hover:bg-zinc-800 rounded-2xl text-2xl transition-all">
                    ☀️
                </button>
            </div>
        </div>

        <!-- LANDING -->
        <div id="landing">
            <div class="text-center mb-16">
                <h2 class="text-6xl font-bold tracking-tighter leading-none mb-4">Anında<br>Paylaşım</h2>
                <p class="text-xl text-zinc-400">Gerçek zamanlı • Güvenli • Masaüstü & Mobil</p>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <!-- Yeni Oda -->
                <div onclick="showCreateModal()" 
                     class="glass border border-zinc-700 hover:border-cyan-400 rounded-3xl p-10 cursor-pointer card-hover group">
                    <div class="text-cyan-400 mb-2 text-sm font-medium">✦ YENİ</div>
                    <h3 class="text-3xl font-semibold mb-3">Yeni Oda Oluştur</h3>
                    <p class="text-zinc-400">İsim ver, şifre koy, hemen başla</p>
                </div>

                <!-- Katıl -->
                <div class="glass border border-zinc-700 rounded-3xl p-10">
                    <h3 class="text-2xl font-semibold mb-6">Odaya Katıl</h3>
                    <input id="joinRoomId" placeholder="Oda kodu" 
                           class="w-full bg-zinc-900 border border-zinc-700 focus:border-cyan-400 rounded-3xl px-6 py-5 text-lg mb-4 outline-none">
                    <input id="joinPass" type="password" placeholder="Şifre (varsa)" 
                           class="w-full bg-zinc-900 border border-zinc-700 focus:border-cyan-400 rounded-3xl px-6 py-5 text-lg mb-6 outline-none">
                    <button onclick="joinRoom()" 
                            class="w-full bg-white text-zinc-900 hover:bg-cyan-400 hover:text-white font-semibold py-6 rounded-3xl text-xl transition-all">
                        Katıl
                    </button>
                </div>
            </div>

            <!-- PWA Bilgilendirme -->
            <div class="mt-12 text-center text-sm text-zinc-500 flex items-center justify-center gap-2">
                <span>💡</span>
                <span>Bu uygulamayı ana ekrana ekleyerek daha hızlı kullanabilirsiniz</span>
                <button onclick="installPWA()" class="text-cyan-400 underline hover:text-cyan-300">Şimdi Yükle →</button>
            </div>
        </div>

        <!-- ROOM SCREEN (önceki kodla aynı, kısaltıldı) -->
        <div id="roomScreen" class="hidden">
            <!-- ... (önceki mesajdaki roomScreen içeriği aynı kalıyor) ... -->
            <div class="flex justify-between items-center mb-8 bg-zinc-900 border border-zinc-700 rounded-3xl px-8 py-5">
                <div class="flex items-center gap-4">
                    <div id="roomName" class="text-3xl font-semibold"></div>
                    <div id="roomId" class="font-mono text-cyan-400 bg-zinc-800 px-4 py-2 rounded-2xl text-sm"></div>
                </div>
                <div class="flex gap-3">
                    <button onclick="showSettingsModal()" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">⚙️ Ayarlar</button>
                    <button onclick="copyRoomLink()" class="px-5 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">🔗 Link</button>
                    <button onclick="leaveRoom()" class="px-5 py-3 text-red-400 hover:bg-red-500/10 rounded-2xl">Çıkış</button>
                </div>
            </div>

            <div id="currentContent" class="glass border border-zinc-700 rounded-3xl p-10 min-h-[300px] flex flex-col items-center justify-center relative"></div>

            <!-- Paylaşım ve Tarihçe kısmı aynı kalıyor... -->
        </div>
    </div>

    <!-- Modallar (önceki kodla aynı) -->
    <!-- createModal ve settingsModal burada da aynı şekilde devam ediyor... -->

    <script>
        let socket = null;
        let currentRoomId = null;
        let isDark = true;
        let deferredPrompt = null;   // PWA install prompt

        // ==================== TEMA ====================
        function toggleTheme() {
            isDark = !isDark;
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.getElementById('themeBtn').innerHTML = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('themeBtn').innerHTML = '🌙';
            }
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // ==================== PWA INSTALL ====================
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });

        async function installPWA() {
            if (!deferredPrompt) {
                alert("✅ Zaten yüklü veya tarayıcınız PWA desteklemiyor.");
                return;
            }
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                document.getElementById('installBtn').classList.add('hidden');
            }
            deferredPrompt = null;
        }

        // ==================== Diğer Fonksiyonlar (önceki kodla aynı) ====================
        function showCreateModal() { 
            document.getElementById('createModal').classList.remove('hidden'); 
        }
        function hideCreateModal() { 
            document.getElementById('createModal').classList.add('hidden'); 
        }
        // ... (createRoomConfirm, joinRoom, enterRoom, sendText vb. aynı kalıyor)

        function createRoomConfirm() {
            const name = document.getElementById('createRoomName').value || "Yeni Oda";
            const pass = document.getElementById('createPass').value || null;
            hideCreateModal();

            socket = io();
            socket.emit('createRoom', { roomName: name, password: pass });
            
            socket.on('roomCreated', ({ roomId }) => {
                currentRoomId = roomId;
                enterRoom(roomId, name);
            });
        }

        // ... (diğer fonksiyonlarınız aynı şekilde devam eder)

        // Sayfa yüklendiğinde
        window.onload = () => {
            if (localStorage.getItem('theme') === 'light') {
                isDark = false;
                document.documentElement.classList.remove('dark');
                document.getElementById('themeBtn').innerHTML = '🌙';
            }

            console.log('%cClipShare Pro + PWA Yüklendi ✨', 'color:#22d3ee; font-weight:600');
        };
    </script>
</body>
</html>
